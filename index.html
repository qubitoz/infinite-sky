<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>INFINITE SKY — Procedural Space Explorer</title>
<link rel="stylesheet" href="./vendor/fonts.css">
<style>
  :root{
    --ink:#d7ecff; --dim:#8fb4cf; --acc:#5ef2d6; --acc2:#7fc4ff;
    --line:rgba(170,220,255,.28); --panel:rgba(6,14,24,.58);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#02030a}
  body{font-family:'Rajdhani',system-ui,sans-serif;color:var(--ink);
       -webkit-user-select:none;user-select:none;cursor:crosshair}
  canvas{display:block;position:fixed;inset:0;z-index:0}

  #vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 52%,rgba(0,2,8,.55) 100%)}
  /* warp tunnel vignette while the pulse drive is engaged */
  #pulsevin{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0;transition:opacity .45s;
    background:radial-gradient(ellipse at center,transparent 30%,rgba(60,30,120,.38) 75%,rgba(15,8,40,.72) 100%)}
  body.pulsing #pulsevin{opacity:1}
  /* hyperdrive engage/disengage flash */
  #warpflash{position:fixed;inset:0;z-index:8;pointer-events:none;opacity:0;
    background:radial-gradient(circle at center,rgba(210,235,255,.95),rgba(150,170,255,.35) 45%,transparent 75%)}
  #warpflash.go{animation:wflash .55s ease-out}
  @keyframes wflash{0%{opacity:.9}100%{opacity:0}}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity .6s}
  #hud.on{opacity:1}

  #crosshair{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
  #crosshair .dot{width:4px;height:4px;background:var(--ink);border-radius:50%;
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);box-shadow:0 0 6px rgba(150,220,255,.9)}
  #crosshair .ring{width:46px;height:46px;border:1px solid var(--line);border-radius:50%;
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
  #crosshair .tick{position:absolute;left:50%;top:50%;width:1px;height:7px;background:var(--line)}
  #crosshair .t1{transform:translate(-50%,-31px)} #crosshair .t2{transform:translate(-50%,24px)}
  #crosshair .t3{transform:translate(-31px,-50%) rotate(90deg)} #crosshair .t4{transform:translate(30px,-50%) rotate(90deg)}
  body.walking #crosshair .ring{width:18px;height:18px}
  body.walking #crosshair .tick{display:none}

  .panel{background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(7px);
    clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px))}

  /* planet card */
  #pcard{position:absolute;left:26px;top:78px;width:300px;padding:16px 18px;display:none}
  #pcard.on{display:block}
  #pcard .pc-name{font-family:'Orbitron';font-size:21px;letter-spacing:3px;color:#fff}
  #pcard .pc-type{font-size:13px;letter-spacing:4px;color:var(--acc);margin:2px 0 10px}
  #pcard .row{display:flex;justify-content:space-between;gap:10px;font-size:14px;letter-spacing:1.5px;
    border-top:1px solid rgba(170,220,255,.12);padding:4px 0}
  #pcard .row span{text-align:right}
  #pcard .row b{color:var(--dim);font-weight:600}
  #pcard .pc-hint{margin-top:10px;font-size:12px;letter-spacing:2px;color:var(--dim)}
  #pcard .pc-disc{font-size:11px;letter-spacing:3px;color:var(--acc);margin-top:6px}

  /* telemetry */
  #telemetry{position:absolute;right:26px;bottom:26px;width:265px;padding:14px 18px}
  #speed{font-family:'Orbitron';font-size:30px;letter-spacing:2px;color:#fff;line-height:1}
  #speed small{font-size:12px;color:var(--dim);letter-spacing:2px}
  #altline{font-size:13px;letter-spacing:2px;color:var(--dim);margin:4px 0 10px}
  .bar{margin-top:7px}
  .bar label{font-size:11px;letter-spacing:3px;color:var(--dim);display:flex;justify-content:space-between}
  .bar .track{height:5px;background:rgba(140,200,255,.12);margin-top:3px;overflow:hidden}
  .bar .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--acc2),var(--acc));
    box-shadow:0 0 8px rgba(94,242,214,.5);transition:width .08s linear}
  .bar.pulse .fill{background:linear-gradient(90deg,#b48cff,#ff7ad9)}

  /* top bar */
  #topbar{position:absolute;top:18px;left:50%;transform:translateX(-50%);text-align:center}
  #sysname{font-size:14px;letter-spacing:6px;color:var(--dim)}
  #worlds{font-size:12px;letter-spacing:3px;color:var(--acc);margin-top:2px}
  #species{font-size:11px;letter-spacing:3px;color:#9fe87f;margin-top:1px}

  /* toasts */
  #toasts{position:absolute;top:84px;left:50%;transform:translateX(-50%);text-align:center;width:600px}
  .toast{margin:6px auto;padding:10px 26px;display:inline-block;animation:toastin 4.6s forwards}
  .toast .t-main{font-family:'Orbitron';font-size:17px;letter-spacing:4px;color:#fff}
  .toast .t-sub{font-size:12px;letter-spacing:3px;color:var(--acc);margin-top:2px}
  @keyframes toastin{0%{opacity:0;transform:translateY(-8px)}6%{opacity:1;transform:none}
    82%{opacity:1}100%{opacity:0;transform:translateY(6px)}}

  /* markers */
  #markers{position:absolute;inset:0;overflow:hidden}
  .mk{position:absolute;transform:translate(-50%,-50%);text-align:center;transition:opacity .3s}
  .mk .d{width:9px;height:9px;border:1px solid var(--acc2);transform:rotate(45deg);margin:0 auto;
    box-shadow:0 0 6px rgba(127,196,255,.5)}
  .mk.disc .d{background:rgba(94,242,214,.55);border-color:var(--acc)}
  .mk .nm{font-size:11px;letter-spacing:2px;color:var(--ink);margin-top:5px;white-space:nowrap;
    text-shadow:0 0 4px #000}
  .mk .ds{font-size:10px;letter-spacing:1px;color:var(--dim);white-space:nowrap}
  .mk.star .d{border-radius:50%;border-color:#ffd97a;transform:none}
  .mk.creature .d{border-radius:50%;border-color:#9fe87f;transform:none;
    box-shadow:0 0 6px rgba(159,232,127,.6)}

  /* species catalog */
  #catalog{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:700px;
    max-height:76vh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
    padding:20px 26px;display:none}
  #catalog.on{display:block}
  #catalog h3{font-family:'Orbitron';font-size:16px;letter-spacing:4px;color:#9fe87f;margin-bottom:6px}
  .cat-planet{display:flex;justify-content:space-between;letter-spacing:2px;font-size:13px;
    color:var(--acc2);border-top:1px solid rgba(170,220,255,.14);padding:8px 0 5px}
  .cat-planet span{color:var(--dim);font-size:11px;letter-spacing:2px}
  .cat-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px}
  .sp-card{width:148px;padding:7px 10px;background:rgba(18,36,54,.5);border:1px solid rgba(170,220,255,.16)}
  .sp-card .sw{width:13px;height:13px;border-radius:50%;display:inline-block;vertical-align:-2px;
    margin-right:6px;background:rgba(120,150,180,.25);box-shadow:0 0 6px rgba(255,255,255,.2)}
  .sp-card .nm{font-size:13px;letter-spacing:1px;color:var(--ink)}
  .sp-card .meta{font-size:9.5px;letter-spacing:1.5px;color:var(--dim);margin-top:3px}
  .sp-card.unknown{opacity:.55}
  .sp-card .r-rare{color:#ffd97a}
  .sp-card .r-uncommon{color:var(--acc)}
  .sp-card .r-common{color:var(--dim)}
  .mk.pickup .d{border-radius:50%;border-color:#ffd97a;transform:none;
    box-shadow:0 0 6px rgba(255,217,122,.6)}

  /* outfit panel */
  #outfit{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:520px;
    max-height:76vh;overflow:hidden;padding:20px 26px;display:none}
  #outfit.on{display:block}
  #outfit h3{font-family:'Orbitron';font-size:16px;letter-spacing:4px;color:#ffd97a;margin-bottom:10px}
  #outfit .mats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
  .matchip{font-size:11px;letter-spacing:1.5px;color:var(--ink);padding:3px 8px;
    border:1px solid rgba(170,220,255,.18);background:rgba(18,36,54,.5)}
  .matchip.dim{opacity:.4}
  .matchip i{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
  #outfit .piece{display:flex;justify-content:space-between;font-size:14px;letter-spacing:1.5px;
    padding:5px 8px;border-top:1px solid rgba(170,220,255,.1)}
  #outfit .piece b{color:#ffd97a;margin-right:10px;font-weight:700}
  #outfit .piece span{color:var(--dim);font-size:11px;letter-spacing:2px}
  #outfit .piece.eq{background:rgba(94,242,214,.1)}
  #outfit .piece.eq span{color:var(--acc)}
  #outfit .piece.locked{opacity:.45}
  #outfit .o-hint{margin-top:12px;font-size:11px;letter-spacing:2px;color:var(--dim)}

  /* first-flight tutorial banner */
  #tutorial{position:absolute;top:88px;left:50%;transform:translateX(-50%);width:560px;
    max-width:92vw;padding:14px 22px;text-align:center;display:none;pointer-events:auto;cursor:pointer;
    background:rgba(8,18,30,.72);border:1px solid var(--acc);backdrop-filter:blur(7px);
    clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
    animation:tutglow 2.2s infinite}
  #tutorial.on{display:block}
  #tutorial .tu-head{font-family:'Orbitron';font-size:12px;letter-spacing:4px;color:var(--acc)}
  #tutorial .tu-text{font-size:18px;font-weight:600;letter-spacing:2px;color:#fff;margin-top:6px}
  #tutorial .tu-skip{font-size:10px;letter-spacing:2px;color:var(--dim);margin-top:6px}
  @keyframes tutglow{0%,100%{box-shadow:0 0 10px rgba(94,242,214,.25)}50%{box-shadow:0 0 24px rgba(94,242,214,.6)}}
  @media (max-width: 920px), (max-height: 560px){
    #tutorial{top:64px;padding:8px 12px}
    #tutorial .tu-text{font-size:13px;letter-spacing:1px}
  }

  /* celebration confetti */
  #confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none}
  #confetti i{position:absolute;top:-12px;width:9px;height:14px;opacity:.95;
    animation:confall 2s linear forwards}
  @keyframes confall{0%{transform:translateY(-20px) rotate(0deg)}
    100%{transform:translateY(105vh) rotate(660deg);opacity:.6}}

  /* hangar / trade reuse outfit styles */
  #hangar,#trade{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:480px;
    max-height:70vh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
    padding:20px 26px;display:none}
  #hangar.on,#trade.on{display:block}
  #hangar h3,#trade h3{font-family:'Orbitron';font-size:16px;letter-spacing:4px;color:var(--acc2);margin-bottom:10px}
  #hangar .piece,#trade .piece{display:flex;justify-content:space-between;font-size:14px;letter-spacing:1.5px;
    padding:6px 8px;border-top:1px solid rgba(170,220,255,.1)}
  #hangar .piece b,#trade .piece b{color:#ffd97a;margin-right:10px;font-weight:700}
  #hangar .piece span,#trade .piece span{color:var(--dim);font-size:11px;letter-spacing:2px}
  #hangar .piece.eq,#trade .piece.eq{background:rgba(94,242,214,.1)}
  #hangar .o-hint,#trade .o-hint{margin-top:12px;font-size:11px;letter-spacing:2px;color:var(--dim)}

  /* radar */
  #radarwrap{position:absolute;right:26px;bottom:235px;padding:12px;display:none}
  #radarwrap.on{display:block}
  #radar{width:290px;height:290px;display:block}
  #radarcap{font-size:11px;letter-spacing:2px;color:var(--acc);margin-top:7px;max-width:290px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}

  /* touch controls */
  #touchui{display:none}
  body.touch #touchui{display:block}
  body.touch #hint{display:none}
  body.touch #radarwrap{left:170px;right:auto;bottom:22px}
  body.touch #telemetry{right:14px;bottom:312px;width:230px}
  #lookpad{position:absolute;right:0;top:0;width:62%;height:100%;pointer-events:auto;touch-action:none}
  #joy{position:absolute;left:22px;bottom:22px;width:132px;height:132px;border:2px solid var(--line);
    border-radius:50%;pointer-events:auto;touch-action:none;background:rgba(10,22,34,.4)}
  #joynub{position:absolute;left:50%;top:50%;width:58px;height:58px;margin:-29px 0 0 -29px;border-radius:50%;
    background:rgba(127,196,255,.45);border:1px solid var(--acc2)}
  #tbtns{position:absolute;right:14px;bottom:18px;display:grid;grid-template-columns:repeat(2,82px);
    gap:10px;pointer-events:auto}
  #tbtns button{height:56px;border-radius:14px;background:rgba(10,24,38,.55);border:1px solid var(--line);
    color:var(--ink);font-family:'Rajdhani';font-weight:700;font-size:13px;letter-spacing:1px;
    touch-action:none;-webkit-user-select:none;user-select:none}
  #tbtns button.on,#tbtns button:active{background:rgba(94,242,214,.3);border-color:var(--acc)}
  #radbtns{display:none;justify-content:space-between;gap:8px;margin-top:8px;pointer-events:auto}
  body.touch #radarwrap.galaxy #radbtns{display:flex}
  #radbtns button{flex:1;height:46px;border-radius:10px;background:rgba(10,24,38,.6);border:1px solid var(--line);
    color:var(--acc);font-family:'Rajdhani';font-weight:700;font-size:15px;touch-action:none}
  #catalog,#outfit,#hangar,#trade{pointer-events:auto;cursor:pointer}

  /* fps meter (?fps=1) */
  #fps{position:fixed;top:8px;left:8px;z-index:30;color:#8aff9f;
    font:700 12px Rajdhani;letter-spacing:2px;background:rgba(0,0,0,.45);padding:3px 8px}

  /* language button */
  #langbtn{position:fixed;top:20px;right:24px;z-index:12;font-size:13px;letter-spacing:3px;color:var(--ink);
    padding:8px 18px;border:1px solid var(--line);cursor:pointer;background:rgba(8,20,32,.6);
    clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
  #langbtn:hover{border-color:var(--acc)}

  /* title profile input */
  .profrow{display:flex;align-items:center;gap:14px;margin-bottom:26px}
  .profrow span{font-size:12px;letter-spacing:4px;color:var(--dim)}
  .profrow input{background:rgba(8,20,32,.7);border:1px solid var(--line);color:#fff;
    font-family:'Rajdhani';font-size:18px;letter-spacing:4px;padding:8px 14px;width:240px;
    outline:none;text-transform:uppercase;text-align:center;
    clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
  .profrow input:focus{border-color:var(--acc)}

  /* ---------- compact layout for phones / short windows ---------- */
  @media (max-width: 920px), (max-height: 560px) {
    #topbar{top:6px}
    #sysname{font-size:10px;letter-spacing:3px}
    #worlds{font-size:9.5px;letter-spacing:2px}
    #species{font-size:9px;letter-spacing:2px}
    #toasts{width:92vw;top:52px}
    .toast{padding:6px 14px}
    .toast .t-main{font-size:13px;letter-spacing:2px}
    .toast .t-sub{font-size:10px;letter-spacing:2px}
    #pcard{left:8px;top:50px;width:204px;padding:9px 11px}
    #pcard .pc-name{font-size:15px;letter-spacing:2px}
    #pcard .pc-type{font-size:10px;letter-spacing:2px;margin:1px 0 5px}
    #pcard .row{font-size:10.5px;padding:2px 0}
    #pcard .pc-disc{font-size:9px;letter-spacing:2px;margin-top:4px}
    #pcard .pc-hint{display:none}
    #telemetry{right:8px;top:42px;bottom:auto;width:156px;padding:8px 10px}
    #speed{font-size:18px}
    #altline{font-size:10px;margin:2px 0 6px}
    .bar label{font-size:8.5px;letter-spacing:2px}
    #langbtn{top:6px;right:8px;font-size:10px;padding:5px 10px;letter-spacing:2px}
    body.touch.playing #langbtn{display:none}
    #hint{font-size:10px;max-width:60vw;bottom:8px;left:8px;line-height:1.7}
    #help,#catalog,#outfit,#hangar,#trade{width:min(94vw,560px);max-height:84vh;padding:12px 14px}
    .sp-card{width:124px;padding:5px 7px}
    #radarwrap{padding:8px}
    #radar{width:170px;height:170px}
    #radarcap{font-size:9px;max-width:170px;margin-top:4px;letter-spacing:1px}
    body.touch #radarwrap{left:50%;right:auto;bottom:8px;transform:translateX(-50%)}
    body.touch #telemetry{right:8px;top:42px;bottom:auto;width:156px}
    body.touch #joy{left:10px;bottom:10px;width:106px;height:106px}
    #joynub{width:46px;height:46px;margin:-23px 0 0 -23px}
    body.touch #tbtns{right:8px;bottom:10px;grid-template-columns:repeat(2,62px);gap:7px}
    body.touch #tbtns button{height:40px;font-size:9.5px;border-radius:10px;letter-spacing:0.5px}
    #radbtns{margin-top:5px;gap:6px}
    #radbtns button{height:34px;font-size:12px}
    /* title screen */
    #title h1{font-size:34px;letter-spacing:10px;margin-left:10px}
    #title h2{font-size:11px;letter-spacing:5px}
    #title .seedline{font-size:9px;margin-bottom:12px}
    #title .ctl{font-size:10px;gap:2px 14px;margin-bottom:14px;max-height:30vh;overflow:hidden}
    .profrow{margin-bottom:12px}
    .profrow input{font-size:14px;padding:6px 10px;width:180px}
    #title .cta{font-size:13px;letter-spacing:4px;padding:9px 26px}
  }

  /* hint + help */
  #hint{position:absolute;left:26px;bottom:26px;font-size:12px;letter-spacing:2px;color:var(--dim);
    max-width:430px;line-height:1.9}
  #hint b{color:var(--ink)}
  #help{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:480px;
    padding:22px 28px;display:none}
  #help.on{display:block}
  #help h3{font-family:'Orbitron';letter-spacing:4px;font-size:16px;margin-bottom:12px;color:var(--acc)}
  #help .hrow{display:flex;justify-content:space-between;font-size:14px;letter-spacing:1px;
    padding:4px 0;border-bottom:1px solid rgba(170,220,255,.1)}
  #help .hrow b{color:var(--acc2);font-weight:600}

  /* scan fx */
  #scanring{position:absolute;left:50%;top:50%;width:10px;height:10px;border:2px solid var(--acc);
    border-radius:50%;transform:translate(-50%,-50%);opacity:0;pointer-events:none}
  #scanring.go{animation:scan 1.1s ease-out}
  @keyframes scan{0%{opacity:.9;width:10px;height:10px}100%{opacity:0;width:160vmax;height:160vmax}}

  #loading{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
    font-size:11px;letter-spacing:4px;color:var(--dim);opacity:0;transition:opacity .4s}
  #loading.on{opacity:1}

  /* ---------- TITLE ---------- */
  #title{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:radial-gradient(ellipse at 50% 60%,rgba(2,6,16,.25),rgba(1,2,8,.78));
    transition:opacity .8s;cursor:pointer}
  #title.off{opacity:0;pointer-events:none}
  #title h1{font-family:'Orbitron';font-weight:700;font-size:64px;letter-spacing:22px;color:#fff;
    text-shadow:0 0 30px rgba(127,196,255,.55);margin-left:22px}
  #title h2{font-size:16px;letter-spacing:9px;color:var(--acc);margin:10px 0 6px}
  #title .seedline{font-size:12px;letter-spacing:3px;color:var(--dim);margin-bottom:34px}
  #title .ctl{display:grid;grid-template-columns:auto auto;gap:4px 26px;font-size:14px;
    letter-spacing:2px;color:var(--dim);margin-bottom:44px}
  #title .ctl b{color:var(--ink);text-align:right;font-weight:600}
  #title .cta{font-family:'Orbitron';font-size:19px;letter-spacing:7px;color:#fff;
    padding:13px 44px;border:1px solid var(--acc);animation:pulse 2.2s infinite;
    clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px))}
  @keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(94,242,214,.25)}50%{box-shadow:0 0 26px rgba(94,242,214,.7)}}

  #paused{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;
    background:rgba(1,3,9,.55);cursor:pointer}
  #paused.on{display:flex}
  #paused .p{font-family:'Orbitron';font-size:22px;letter-spacing:8px;color:#fff}

  #err{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
    color:#ff9a9a;font-size:18px;letter-spacing:2px;text-align:center;padding:40px}
</style>
</head>
<body>
  <div id="vignette"></div>
  <div id="pulsevin"></div>
  <div id="warpflash"></div>

  <div id="hud">
    <div id="crosshair"><div class="ring"></div><div class="dot"></div>
      <div class="tick t1"></div><div class="tick t2"></div><div class="tick t3"></div><div class="tick t4"></div></div>
    <div id="markers"></div>
    <div id="topbar"><div id="sysname">SYSTEM</div><div id="worlds">0 WORLDS CHARTED</div><div id="species">0 SPECIES LOGGED</div></div>
    <div id="toasts"></div>
